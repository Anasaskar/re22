<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول - منصة التراث العمراني</title>
    <!-- Use the compiled SPA CSS -->
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body class="min-h-screen text-white relative overflow-hidden flex flex-col bg-grid">

    <!-- Faint Architectural Background Elements (Global) -->
    <div
        class="fixed left-6 top-0 bottom-0 w-8 flex flex-col items-center justify-evenly opacity-[0.04] pointer-events-none z-0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-8 h-8">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
        </svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-8 h-8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 2l8 4v10l-8 6-8-6V6l8-4z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 22V12M12 12L4 6M12 12l8-6" />
        </svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-8 h-8">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M4 22h16M4 22V8l8-6 8 6v14m-9-3v-5h2v5m-6-5h1m12 0h-1M6 10h1m10 0h1" />
        </svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-8 h-8">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 21h18M5 21V5a2 2 0 012-2h10a2 2 0 012 2v16M9 9h6M9 14h6M9 19h6" />
        </svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-8 h-8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 2v20M8 5h8M6 9h12M4 13h16M2 17h20" />
        </svg>
    </div>

    <!-- Right side background decors -->
    <div
        class="fixed right-6 top-0 bottom-0 w-8 flex flex-col items-center justify-evenly opacity-[0.04] pointer-events-none z-0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-8 h-8">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 21h18M5 21V5a2 2 0 012-2h10a2 2 0 012 2v16M9 9h6M9 14h6M9 19h6" />
        </svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-8 h-8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 2v20M8 5h8M6 9h12M4 13h16M2 17h20" />
        </svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-8 h-8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 2l8 4v10l-8 6-8-6V6l8-4z" />
        </svg>
    </div>

    <!-- Sticky Navbar -->
    <nav class="fixed top-8 left-0 right-0 z-50 flex justify-center flex-none">
        <div
            class="bg-[#122235]/80 border border-white/10 backdrop-blur-md rounded-[18px] px-10 py-3.5 flex items-center shadow-[0_8px_32px_rgba(0,0,0,0.5)]">
            <div class="flex items-center gap-10 text-[15px]">
                <a href="/index.html" class="text-white/60 hover:text-white transition font-semibold group relative">
                    الرئيسية
                    <span
                        class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-0 h-[2px] bg-white rounded-full transition-all group-hover:w-4"></span>
                </a>
                <a href="/services.html" class="text-white/60 hover:text-white transition font-semibold group relative">
                    خدماتنا
                    <span
                        class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-0 h-[2px] bg-white rounded-full transition-all group-hover:w-4"></span>
                </a>
                <a href="/index.html#vision"
                    class="text-white/60 hover:text-white transition font-semibold group relative">
                    الرؤية والرسالة
                    <span
                        class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-0 h-[2px] bg-white rounded-full transition-all group-hover:w-4"></span>
                </a>
                <a href="/index.html#goals"
                    class="text-white/60 hover:text-white transition font-semibold group relative">
                    أهدافنا
                    <span
                        class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-0 h-[2px] bg-white rounded-full transition-all group-hover:w-4"></span>
                </a>
                <a href="/index.html#about"
                    class="text-white/60 hover:text-white transition font-semibold group relative">
                    عن المنصة
                    <span
                        class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-0 h-[2px] bg-white rounded-full transition-all group-hover:w-4"></span>
                </a>
                <a href="/index.html#story"
                    class="text-white/60 hover:text-white transition font-semibold group relative">
                    قصتنا
                    <span
                        class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-0 h-[2px] bg-white rounded-full transition-all group-hover:w-4"></span>
                </a>
                <a href="#" class="text-white/60 hover:text-white transition font-semibold">تواصل معنا</a>

                <div class="w-px h-5 bg-white/10 mx-2"></div>

                <a href="/login.html" class="text-[#dfb867] transition font-bold relative">
                    تسجيل الدخول
                    <span
                        class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4 h-[2px] bg-[#dfb867] rounded-full"></span>
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-[1300px] w-full mx-auto px-6 h-screen flex flex-col relative z-10 pt-32 pb-10">

        <!-- CONTENT (LOGIN BOX) -->
        <main class="flex-grow flex items-center justify-center">

            <div
                class="w-full max-w-[440px] rounded-[24px] border-[1.5px] border-[#dfb867]/40 p-[40px] pt-[45px] pb-[45px] backdrop-blur-[12px] bg-[#1a2b40]/80 shadow-[0_15px_50px_rgba(0,0,0,0.5)] flex flex-col relative overflow-hidden group">

                <!-- Subtle glow behind the form -->
                <div
                    class="absolute -top-16 -right-16 w-32 h-32 bg-[#dfb867]/10 blur-[40px] rounded-full pointer-events-none transition-opacity duration-500 opacity-50 group-hover:opacity-100">
                </div>
                <div
                    class="absolute -bottom-16 -left-16 w-32 h-32 bg-[#254b73]/20 blur-[40px] rounded-full pointer-events-none transition-opacity duration-500 opacity-50 group-hover:opacity-100">
                </div>

                <div class="relative z-10 flex flex-col gap-6">
                    <!-- Email Field -->
                    <div class="flex flex-col gap-2">
                        <label class="text-[14px] text-white/95 font-semibold pr-1">البريد الإلكتروني</label>
                        <input type="email" placeholder="أدخل البريد الإلكتروني"
                            class="w-full bg-transparent border-[1.5px] border-white/20 rounded-[10px] px-4 py-3 text-[14px] text-white placeholder-white/40 focus:outline-none focus:border-[#dfb867]/80 focus:bg-white/5 transition-all outline-none" />
                    </div>

                    <!-- Password Field -->
                    <div class="flex flex-col gap-2">
                        <label class="text-[14px] text-white/95 font-semibold pr-1">كلمة السر</label>
                        <input type="password" placeholder="أدخل كلمة السر"
                            class="w-full bg-transparent border-[1.5px] border-white/20 rounded-[10px] px-4 py-3 text-[14px] text-white placeholder-white/40 focus:outline-none focus:border-[#dfb867]/80 focus:bg-white/5 transition-all outline-none" />
                    </div>

                    <!-- Create Account Link -->
                    <div class="flex justify-end pr-1 mt-[-6px]">
                        <a href="/register.html"
                            class="text-[12px] text-[#dfb867] hover:text-[#f8d07a] font-medium transition-colors">
                            إنشاء حساب جديد
                        </a>
                    </div>

                    <!-- Submit Button -->
                    <button
                        class="mt-3 w-full bg-gradient-to-l from-[#ba8c3e] to-[#dfb867] hover:scale-[1.02] active:scale-[0.98] transition-all text-[#0a111a] py-3 rounded-[10px] font-bold text-[15px] flex items-center justify-center gap-2 shadow-[0_5px_15px_rgba(223,184,103,0.25)]">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                        تسجيل الدخول
                    </button>
                </div>

            </div>

        </main>
    </div>
</body>

</html>
